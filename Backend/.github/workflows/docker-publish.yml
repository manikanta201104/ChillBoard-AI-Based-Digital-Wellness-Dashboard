name: Build and Push Backend Docker Image to GHCR

on:
  push:
    branches: [ main ]  # Change if your default branch is not "main"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1 — Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 — Log in to GitHub Container Registry
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Step 3 — Extract Docker metadata
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-backend
          tags: |
            type=raw,value=latest
            type=raw,value=${{ github.sha }}

      # Step 4 — Build and push Docker image (pointing to backend folder)
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./Backend      # <<<<<< Path to your backend folder
          file: ./Backend/Dockerfile  # <<<<<< Explicit Dockerfile path
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
