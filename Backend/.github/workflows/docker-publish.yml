name: Build and Push Backend Docker Image to GHCR

on:
  push:
    branches: [ main ]  

permissions:
  contents: read
  packages: write
  id-token: write   

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-backend
          tags: |
            type=raw,value=latest
            type=raw,value=${{ github.sha }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./Backend     
          file: ./Backend/Dockerfile  
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.6.0

      - name: Cosign sign image
        run: |
          IMAGE=ghcr.io/${{ github.repository }}-backend
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' $IMAGE:latest)
          echo "Signing $DIGEST"

          for i in 1 2 3; do
            if cosign sign --yes $DIGEST; then
              echo "✅ Cosign signing succeeded"
              break
            fi
            echo "⚠️ Cosign signing failed, retrying in 30s... (attempt $i)"
            sleep 30
          done
