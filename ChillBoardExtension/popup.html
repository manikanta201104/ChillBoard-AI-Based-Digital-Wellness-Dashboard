<!DOCTYPE html>
<html>
<head>
  <title>ChillBoard</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <h1>ChillBoard</h1>

  <div id="login-container" style="display: none;">
    <div class="input-group">
      <label for="email">Email:</label>
      <input type="email" id="email" placeholder="Enter your email" />
    </div>
    <div class="input-group">
      <label for="password">Password:</label>
      <input type="password" id="password" placeholder="Enter your password" />
    </div>
    <button id="login-btn">Login</button>
    <div id="login-error"></div>
  </div>

  <div id="stats-container" style="display: none;">
    <p>Device: <span id="device-id"></span></p>
    <p>Today's Screen Time: <span id="total-time">0m</span></p>
    <p>Active Tabs: <span id="tab-count">0</span></p>
    <div id="sync-status" style="font-size: 12px; color: #777; text-align: center; margin-top: 5px;"></div>
    <button id="logout-btn">Logout</button>
    <button id="open-webapp-btn">Open Web App</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
